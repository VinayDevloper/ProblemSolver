<!DOCTYPE html>
<html lang="en">
<head>
    <title>Report Issue</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f5f5f5;
        }

        .container{
            padding: 40px;
        }

        .form-box{
            width: 750px;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow:0 4px 20px rgba(0,0,0,0.08);
        }

        input, textarea{
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
        }

        button{
            background-color: blue;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
        }
        input, textarea{
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        *{
            box-sizing: border-box;
        }

        .category-btn{
            background:white;
            color:black;
            border:1px solid gray;
            margin:5px;
            cursor:pointer;
        }

        .category-btn.active{
            background:blue;
            color:white;
        }

        .subtitle{
            color: gray;
            margin-top: -10px;
            margin-bottom: 25px;
        }

        .upload-box{
            border:2px dashed #cfd4dc;
            border-radius:12px;
            padding:40px;
            text-align:center;
            margin-bottom:20px;
            background:#fafafa;
            cursor:pointer;
            transition:0.2s;
        }

        .upload-box:hover{
            border-color:blue;
            background:#f0f6ff;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        .upload-text{
            color:gray;
            margin-top:5px;
        }

        #issueImage{
            margin-top:15px;
        }

        input,
        textarea{
            border:1px solid #dcdcdc;
            border-radius:8px;
            font-size:15px;
            margin-bottom:25px;
        }

        #submitBtn{
            width:100%;
            margin-top:20px;
            font-size:16px;
            font-weight:bold;
        }


        .container{
            display:flex;
        }

        .sidebar{
            position:fixed;
            left:0;
            top:0;

            width:280px;
            height:100vh;

            padding:20px;
            background:#e9ecef;

            display:flex;
            flex-direction:column;

            box-sizing:border-box;
        }

        .main-content{
            margin-left:320px;
            padding:40px;
        }

        .logo{
            color:#0d6efd;
            margin-bottom:40px;
        }

        .menu-item{
            padding:12px;
            margin-bottom:10px;
            border-radius:8px;
            cursor:pointer;
        }

        .menu-item:hover{
            background:#dbeafe;
            transform:translateX(4px);
            transition:0.2s;
        }

        .active{
            background:#dbeafe;
            color:#0d6efd;
            font-weight:700;
        }

        .logout-section{
            margin-top:auto;
            padding-top:20px;
            border-top:1px solid #d1d5db;
        }

        .logout{
            background:#fee2e2;
            color:#dc2626;
            border:1px solid #fecaca;
            font-weight:600;
            text-align:center;
        }

        .logout:hover{
            background:#fecaca;
        }

    </style>

</head>
<body>

    <div class="container">

        <div class="sidebar">

            <h2 class="logo">
                CampusCoord
            </h2>

            <div
                class="menu-item"
                id="dashboardBtn"
            >
                Dashboard
            </div>

            <div
                class="menu-item active"
                id="reportIssueBtn"
            >
                Report Issue
            </div>

            <div class="menu-item">
                My Issues
            </div>

            <div class="menu-item">
                Leaderboard
            </div>

            <div class="menu-item">
                Resolved
            </div>

            <div class="logout-section">

                <div
                    class="menu-item logout"
                    id="logoutBtn"
                >
                    Logout
                </div>

            </div>

        </div>

        <div class="main-content">

            <div class="form-box">

            <h1>Report Issue</h1>

            <p class="subtitle">
            Help improve the campus by reporting issues with proper details.
            </p>

            

            <label>Issue Title</label>

            <input
                id="title"
                placeholder="e.g. Broken Classroom Fan"
            />

            <label>Description</label>

            <textarea
                id="description"
                placeholder="Describe the issue in detail"
            ></textarea>

            <label>Issue Category</label>

                <div id="categoryContainer">

                    <button type="button" class="category-btn">Infrastructure</button>

                    <button type="button" class="category-btn">Electrical</button>

                    <button type="button" class="category-btn">Cleanliness</button>

                    <button type="button" class="category-btn">Water Supply</button>

                    <button type="button" class="category-btn">Safety</button>

                    <button type="button" class="category-btn">College Facility</button>

                    <button type="button" class="category-btn">Other</button>

                </div>

            <label>Location</label>

            <input
                id="location"
                placeholder="e.g. Classroom 204"
            />

            <label>Issue Image</label>

            <label for="issueImage" class="upload-box">

                <div style="font-size:40px;">
                    📷
                </div>

                <h3>Upload Issue Image</h3>

                <p class="upload-text">
                    Click anywhere to select image
                </p>

                <p class="upload-text">
                    JPG, PNG supported
                </p>

            </label>

            <p id="selectedFileName"></p>

            <input
                type="file"
                id="issueImage"
                hidden
            >

            

            <button id="submitBtn">
                Submit Report
            </button>

        </div>
        
        </div>

    </div>
    <script>

        const token = localStorage.getItem("token")

        document
        .getElementById("issueImage")
        .addEventListener(
            "change",

            function(){

                if(this.files[0]){

                    document.getElementById(
                        "selectedFileName"
                    ).innerText =
                    this.files[0].name
                }

            }
        )

        let selectedCategory = ""

        const categoryButtons =
        document.querySelectorAll(".category-btn")

        categoryButtons.forEach(function(btn){

            btn.addEventListener(
                "click",

                function(){

                    categoryButtons.forEach(function(b){
                        b.classList.remove("active")
                    })

                    btn.classList.add("active")

                    selectedCategory =
                    btn.innerText
                }
            )
        })

        if(!token){
            window.location.href = "login.html"
        }

        submitBtn.addEventListener(
            "click",

            async function(){

                const title =
                document.getElementById("title").value

                const description =
                document.getElementById("description").value

                const category =
                selectedCategory

                const location =
                document.getElementById("location").value

                const imageFile =
                document.getElementById("issueImage").files[0]
                
                const token = localStorage.getItem("token")
                console.log(token)

                submitBtn.innerText = "Submitting..."


                let imageUrl = null

                if(imageFile){

                    const formData = new FormData()

                    formData.append(
                        "file",
                        imageFile
                    )

                    const uploadResponse =
                    await fetch(
                        "http://127.0.0.1:8000/upload",
                        {
                            method: "POST",
                            body: formData
                        }
                    )

                    const uploadData =
                    await uploadResponse.json()

                    console.log(uploadData)

                    imageUrl =
                    uploadData.image_url
                }

                const response = await fetch(
                    "http://127.0.0.1:8000/issues",
                    {
                        method: "POST",

                        headers: {
                            "Content-Type": "application/json",
                                Authorization: `Bearer ${token}`
                        },

                        body: JSON.stringify({
                            title: title,
                            description: description,
                            category: category,
                            location: location,
                            image_url: imageUrl
                        })
                    }
                )
                const data = await response.json()

                console.log(data)
                
                submitBtn.innerText = "Submit"

                document.getElementById("title").value = ""
                document.getElementById("description").value = ""
                document.getElementById("category").value = ""
                document.getElementById("location").value = ""

                window.location.href = "dashboard.html"
                console.log(data)
                
            }
        )

            const logoutBtn =
            document.getElementById("logoutBtn")

            logoutBtn.addEventListener(
                "click",
                function(){

                    localStorage.removeItem("token")

                    window.location.href =
                    "login.html"
                }
            )

            const dashboardBtn =
            document.getElementById("dashboardBtn")

            dashboardBtn.addEventListener(
                "click",
                function(){

                    window.location.href =
                    "dashboard.html"
                }
            )


    </script>

</body>
</html>
