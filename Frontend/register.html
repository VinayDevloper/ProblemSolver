<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Register</title>
    <style>
                
        body{
            font-family:'Segoe UI', sans-serif;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-card{
            background:white;
            padding:40px;
            width:350px;
            border-radius:12px;
            box-shadow:0 4px 20px rgba(0,0,0,0.08);
        }

        .logo{
            width:70px;
            display:block;
            margin:auto;
        }

        h1{
            text-align:center;
            color:#2563eb;
        }

        .subtitle{
            text-align:center;
            color:gray;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            box-sizing:border-box;
            border:1px solid #d1d5db;
            border-radius:8px;
            font-size:15px;
        }

        button{
            width:100%;
            padding:12px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        .footer-text{
            text-align:center;
            color:gray;
            margin-top:20px;
        }

        .copyright{
            text-align:center;
            color:gray;
            font-size:13px;
            margin-top:20px;
        }

        a{
            color:#2563eb;
            text-decoration:none;
            font-weight:bold;
        }
        input:focus{
            outline:none;
            border-color:#2563eb;
        }

        button:hover{
            background:#1d4ed8;
        }

        .password-box{
            position:relative;
            margin-bottom:15px;
        }

        #togglePassword{
            opacity:0.6;
        }

        #togglePassword{
            position:absolute;
            right:15px;
            top:15px;
            width:16px;
            height:12px;
            cursor:pointer;
        }


    </style>
</head>

<body>

    <div class="login-container">

    <div class="login-card">

        <img
            src="images/Logo.png"
            class="logo"
        >

        <h1>CampusCoord</h1>

        <p class="subtitle">
            Create Your Account
        </p>

        <label>Full Name</label>

        <input
            id="name"
            placeholder="Enter full name"
        >

        <label>Email Address</label>

        <input
            id="email"
            type="email"
            placeholder="name@university.edu"
        >

        <label>Password</label>

        <div class="password-box">

        <input
            id="password"
            type="password"
            placeholder="Create password"
        >

        <img
            src="images/eye.png"
            id="togglePassword"
        >

    </div>

        <button id="registerBtn">
            Create Account
        </button>

        <p class="footer-text">
            Already have an account?
            <a href="login.html">Sign In</a>
        </p>

    </div>

    <p class="copyright">
        © 2026 CampusCoord. All rights reserved.
    </p>

    
</div>


    <script>

        const registerBtn =
        document.getElementById("registerBtn")


        registerBtn.addEventListener(
            "click",

            async function () {

                const name =
                document.getElementById("name").value

                const email =
                document.getElementById("email").value

                const password =
                document.getElementById("password").value

                registerBtn.innerText = "Creating Account..."
                registerBtn.disabled = true


                const response = await fetch(
                    "http://127.0.0.1:8000/register",

                    {
                        method: "POST",

                        headers: {
                            "Content-Type":
                            "application/json"
                        },

                        body: JSON.stringify({
                            name: name,
                            email: email,
                            password: password
                        })
                    }
                )

                const data =
                await response.json()

                registerBtn.innerText = "Create Account"
                registerBtn.disabled = false

                console.log(data)

                if(data.message === "Email already registered"){

                    alert("Account already exists")

                }
                else{

                    localStorage.setItem(
                        "token",
                        data.access_token
                    )

                    alert("Account created successfully")

                    window.location.href =
                    "dashboard.html"

                }

            }
        )

        const togglePassword =
        document.getElementById("togglePassword")

        const passwordInput =
        document.getElementById("password")

        togglePassword.addEventListener(
            "click",

            function(){

                if(passwordInput.type === "password"){
                    passwordInput.type = "text"
                }
                else{
                    passwordInput.type = "password"
                }

            }
        )


    </script>

</body>
</html>
