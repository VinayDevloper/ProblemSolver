<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: flex;
        }
        .sidebar{
            position:fixed;
            left:0;
            top:0;

            width:280px;
            height:100vh;

            padding:20px;
            background:#e9ecef;

            display:flex;
            flex-direction:column;
        }

        .category-badge{
            background:#dbeafe;
            color:#2563eb;

            padding:6px 12px;
            border-radius:20px;

            font-size:13px;
            font-weight:600;
        }

        .status-open{
            background:#dcfce7;
            color:#166534;
        }

        .status-progress{
            background:#fef3c7;
            color:#92400e;
        }

        .status-resolved{
            background:#dbeafe;
            color:#1d4ed8;
        }

        .logo{
            margin-bottom:40px;
            color:#0d6efd;
        }

        .menu-item{
            padding:12px;
            margin-bottom:10px;
            border-radius:8px;
            cursor:pointer;
            font-weight:500;
        }

        .issue-header{
            display:flex;
            justify-content:space-between;
            align-items:flex-start;

            margin-bottom:15px;
        }

        .menu-item:hover{
            background:#dbeafe;
            transform:translateX(4px);
            transition:0.2s;
        }

        .active{
            background:#dbeafe;
            color:#0d6efd;

            font-weight:700;
            box-shadow:none;
        }

        
        .logout{
            background:#fee2e2;
            color:#dc2626;
            border:1px solid #fecaca;
            font-weight:600;

            text-align:center;
            padding-left:12px;
        }

        .logout:hover{
            background:#fecaca;
            
        }
        .logout-section{
            margin-top:auto;
            padding-top:20px;
            border-top:1px solid #d1d5db;
        }

        .main-content{
            margin-left:320px;
            padding: 30px;
        }   
        body{
            margin: 0;
            font-family: Arial;
            background-color: #f5f5f5;
        }
        .issue-card{
            width: 800px;

            padding:25px;

            background:white;
            border:none;

            border-radius:14px;

            box-shadow:0 2px 12px rgba(0,0,0,0.08);

            margin-bottom:25px;
        }
        button{
            background-color: blue;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;

            width:100%;
            max-width:850px;

            margin-bottom:20px;
        }

        #sortSelect{
            padding: 10px 35px 10px 15px;
            border-radius: 10px;
            border: 1px solid lightgray;
            background-color: white;
            font-size: 16px;
            cursor: pointer;
            outline: none;
            appearance: none;
            -webkit-appearance: none;

            background-image: url("data:image/svg+xml;utf8,<svg fill='black' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");

            background-repeat: no-repeat;

            background-position: right 10px center;

            background-size: 20px;
        }

        #sortSelect:hover{
            border-color: blue;
        }

        

        .logout-section{
            margin-top:auto;
            padding-bottom:20px;
        }

        .status-badge{
            display:inline-block;

            padding:6px 12px;

            border-radius:20px;

            font-size:14px;
            font-weight:600;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">

        <h2 class="logo">
            CampusCoord
        </h2>

        <div class="menu-item active">
            Dashboard
        </div>

        <div
            class="menu-item"
            id="reportIssueBtn"
        >
            Report Issue
        </div>

        <div class="menu-item">
            My Issues
        </div>

        <div class="menu-item">
            Leaderboard
        </div>

        <div class="menu-item">
            Resolved
        </div>

        <div class="logout-section">

    <div
        class="menu-item logout"
        id="logoutBtn"
    >
        Logout
    </div>

</div>

    </div>
        <div class="main-content">

        <div class="top-bar">

            <h1>Active Issues</h1>

            <select id="sortSelect">

                <option value="newest">
                    Newest
                </option>

                <option value="oldest">
                    Oldest
                </option>

                <option value="trending">
                    Trending
                </option>

            </select>
        </div>

        <div id="issues-container">
                
            </div>
        
    </div>

    <script>
        const token = localStorage.getItem("token")

        if(!token){
            window.location.href = "login.html"
        }
        const issuesContainer =
        document.getElementById("issues-container")

        const sortSelect =
        document.getElementById("sortSelect")

        async function getIssues(){
            const response = await fetch(
                `http://127.0.0.1:8000/issues?sort=${sortSelect.value}`
            )
            const data = await response.json()
            issuesContainer.innerHTML = ""

            for(let issue of data)
            {

                let statusText = issue.status

                    if(issue.status === "in_progress"){
                        statusText = "In Progress"
                    }

                    if(issue.status === "resolved"){
                        statusText = "Resolved"
                    }

                    if(issue.status === "open"){
                        statusText = "Open"
                    }
                
                    let statusClass = "status-open"

                    if(issue.status === "in_progress"){
                        statusText = "In Progress"
                        statusClass = "status-progress"
                    }

                    if(issue.status === "resolved"){
                        statusText = "Resolved"
                        statusClass = "status-resolved"
                    }

                    if(issue.status === "open"){
                        statusText = "Open"
                        statusClass = "status-open"
                    }

                issuesContainer.innerHTML += `
                <div class="issue-card">

                        <div class="issue-header">

                            <h3>${issue.title}</h3>

                            <span class="status-badge ${statusClass}">
                                ${statusText}
                            </span>

                        </div>

                        <p>
                            ${issue.description.substring(0, 100)}...
                        </p>

                        <p>
    <b>Category:</b>

    <span class="category-badge">
        ${issue.category}
    </span>
</p>

                        <p>
                            <b>Location:</b> ${issue.location}
                        </p>

                        <p
                        style="
                        color:gray;
                        font-size:14px;
                        margin-top:-5px;
                        "
                        >
                        ${getTimeAgo(issue.created_at)}
                        </p>

                        

                    <div style="
                    display:flex;
                    gap:20px;
                    margin:15px 0;
                    ">

                        <span
                        onclick="voteIssue(${issue.id})"
                        style="
                        display:flex;
                        align-items:center;
                        gap:6px;
                        cursor:pointer;
                        "
                        >

                        <img
                            src="images/Upvote.png"
                            width="22"
                            height="22"
                        >

                        ${issue.upvotes}

                        </span>

                        <span
                        style="
                        display:flex;
                        align-items:center;
                        gap:6px;
                        "
                        >

                        <img
                            src="images/Comment.png"
                            width="22"
                            height="22"
                        >

                        ${issue.comment_count}

                        </span>


                    </div>

                        <button onclick="openIssueDetail(${issue.id})">
                            View Details
                        </button>

                    </div>
                    
                    `
            }
            
        }

        function getTimeAgo(dateString){

        const now = new Date()

        const created = new Date(dateString)

        const seconds =
        Math.floor(
            (now - created) / 1000
        )

        const minutes =
        Math.floor(seconds / 60)

        const hours =
        Math.floor(minutes / 60)

        const days =
        Math.floor(hours / 24)

        const months =
        Math.floor(days / 30)

        if(months > 0){
            return months + " month ago"
        }

        if(days > 0){
            return days + " day ago"
        }

        if(hours > 0){
            return hours + " hour ago"
        }

        if(minutes > 0){
            return minutes + " min ago"
        }

        return "Just now"
    }




        function openIssueDetail(issueId){
            window.location.href =
            `issue-detail.html?id=${issueId}`
        }
        getIssues()

        sortSelect.addEventListener(
            "change",

            function(){

                getIssues()
            }
        )


        const logoutBtn =
        document.getElementById("logoutBtn")
            logoutBtn.addEventListener(
                "click",
                function(){

                    localStorage.removeItem("token")

                    window.location.href = "login.html"
                }
        )

        const reportIssueBtn =
        document.getElementById("reportIssueBtn")

        reportIssueBtn.addEventListener(
            "click",

            function(){

                window.location.href =
                "report-issue.html"
            }
        )

        async function voteIssue(issueId){

        const token =
        localStorage.getItem("token")

        const response =
        await fetch(
            "http://127.0.0.1:8000/vote",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json",
                    "Authorization":
                    `Bearer ${token}`
                },

                body:JSON.stringify({
                    issue_id:issueId
                })
            }
        )

        const data =
        await response.json()

        alert(data.message)

        getIssues()
    }


    </script>

    
</body>
</html>
