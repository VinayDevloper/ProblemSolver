<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard – CampusCoord</title>

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

.container {
    display: flex;
}

/* ── Sidebar (identical to dashboard) ── */
.sidebar {
    position: fixed;
    left: 0;
    top: 0;
    width: 280px;
    height: 100vh;
    padding: 20px;
    background: #e9ecef;
    display: flex;
    flex-direction: column;
}

.logo {
    color: #0d6efd;
    margin-bottom: 40px;
    font-size: 22px;
    font-weight: 700;
}

.menu-item {
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
    color: #374151;
}

.menu-item:hover {
    background: #dbeafe;
    transform: translateX(4px);
    transition: 0.2s;
}

.active {
    background: #dbeafe;
    color: #0d6efd;
    font-weight: 700;
}

.logout-section {
    margin-top: auto;
    border-top: 1px solid #d1d5db;
    padding-top: 20px;
}

.logout {
    background: #fee2e2;
    color: #dc2626;
    border: 1px solid #fecaca;
    text-align: center;
    font-weight: 600;
}

.logout:hover {
    background: #fecaca;
}

/* ── Main content ── */
.main-content {
    margin-left: 320px;
    padding: 40px;
    width: 100%;
}

.page-title {
    font-size: 32px;
    font-weight: 700;
    color: #111827;
    margin-bottom: 6px;
}

.subtitle {
    color: #6b7280;
    font-size: 15px;
    margin-bottom: 40px;
}

/* ── Podium ── */
.podium-section {
    display: flex;
    justify-content: flex-start;
    align-items: flex-end;
    gap: 16px;
    margin-bottom: 36px;
}

.podium-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
}

.podium-crown {
    font-size: 22px;
    line-height: 1;
}

.podium-avatar {
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 700;
    color: white;
}

.podium-item.rank-1 .podium-avatar {
    width: 64px;
    height: 64px;
    font-size: 24px;
    background: #f59e0b;
    box-shadow: 0 0 0 4px #fef3c7;
}

.podium-item.rank-2 .podium-avatar {
    width: 52px;
    height: 52px;
    font-size: 20px;
    background: #94a3b8;
    box-shadow: 0 0 0 3px #e2e8f0;
}

.podium-item.rank-3 .podium-avatar {
    width: 46px;
    height: 46px;
    font-size: 18px;
    background: #cd7c3b;
    box-shadow: 0 0 0 3px #fde8d0;
}

.podium-name {
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    text-align: center;
}

.podium-pts {
    font-size: 12px;
    color: #6b7280;
}

.podium-block {
    border-radius: 10px 10px 0 0;
    width: 80px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    font-weight: 800;
    color: white;
    letter-spacing: -0.5px;
}

.podium-item.rank-1 .podium-block {
    height: 72px;
    background: #f59e0b;
}

.podium-item.rank-2 .podium-block {
    height: 52px;
    background: #94a3b8;
}

.podium-item.rank-3 .podium-block {
    height: 38px;
    background: #cd7c3b;
}

/* ── Leaderboard table card ── */
.leaderboard-card {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    max-width: 860px;
}

.lb-header {
    display: grid;
    grid-template-columns: 70px 1fr 150px 120px;
    padding: 12px 24px;
    background: #f9fafb;
    border-bottom: 1px solid #e5e7eb;
    font-size: 12px;
    font-weight: 700;
    font-family: Arial, sans-serif;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
}

.lb-header .col-solved,
.lb-header .col-points {
    text-align: right;
}

.user-row {
    display: grid;
    grid-template-columns: 70px 1fr 150px 120px;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid #f3f4f6;
    transition: background 0.15s;
}

.user-row:last-child {
    border-bottom: none;
}

.user-row:hover {
    background: #f9fafb;
}

.col-rank {
    font-size: 18px;
    font-weight: 700;
    color: #2563eb;
}

.col-user {
    display: flex;
    align-items: center;
    gap: 14px;
}

.avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #dbeafe;
    color: #2563eb;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 700;
    font-size: 16px;
    flex-shrink: 0;
}

.user-name {
    font-size: 16px;
    font-weight: 600;
    color: #111827;
}

.col-solved {
    font-size: 14px;
    color: #6b7280;
    text-align: right;
}

.col-points {
    text-align: right;
}

.points-pill {
    display: inline-block;
    background: #dbeafe;
    color: #1d4ed8;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 15px;
    font-weight: 700;
}

/* ── Loading / empty state ── */
.empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #6b7280;
}

.empty-state .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
}

.empty-state h3 {
    margin: 0 0 8px;
    color: #374151;
    font-size: 18px;
}

</style>
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">

        <h2 class="logo">CampusCoord</h2>

        <div class="menu-item" id="dashboardBtn">Dashboard</div>
        <div class="menu-item" id="reportIssueBtn">Report Issue</div>
        <div class="menu-item" id="myProfileBtn">My Profile</div>
        <div class="menu-item active">Leaderboard</div>
        <div class="menu-item" id="resolvedBtn">Resolved</div>

        <div class="logout-section">
            <div class="menu-item logout" id="logoutBtn">Logout</div>
        </div>

    </div>

    <!-- Main -->
    <div class="main-content">

        <h1 class="page-title">Top Contributors</h1>
        <p class="subtitle">People helping solve campus problems</p>

        <!-- Podium (top 3) -->
        <div class="podium-section" id="podiumSection"></div>

        <!-- Full table -->
        <div class="leaderboard-card">
            <div class="lb-header">
                <span>Rank</span>
                <span>Student</span>
                <span class="col-solved">Issues Solved</span>
                <span class="col-points">Points</span>
            </div>
            <div id="leaderboardContainer"></div>
        </div>

    </div>

</div>

<script>

async function getLeaderboard() {

    const response = await fetch("http://127.0.0.1:8000/leaderboard")
    const data = await response.json()

    renderPodium(data)
    renderTable(data)
}

function renderPodium(data) {

    const podium = document.getElementById("podiumSection")

    if (!data || data.length < 1) return

    // Podium order: 2nd, 1st, 3rd
    const order = [data[1], data[0], data[2]].filter(Boolean)
    const ranks = data[1] ? [2, 1, 3] : [1]

    const rankClass = { 1: "rank-1", 2: "rank-2", 3: "rank-3" }

    let html = ""

    order.forEach((user, i) => {

        const rank = ranks[i]
        const rClass = rankClass[rank]

        html += `
        <div class="podium-item ${rClass}">
            ${rank === 1 ? '<div class="podium-crown">👑</div>' : '<div class="podium-crown" style="visibility:hidden">👑</div>'}
            <div class="podium-avatar">${user.name[0].toUpperCase()}</div>
            <div class="podium-name">${user.name}</div>
            <div class="podium-pts">${user.points} pts</div>
            <div class="podium-block">${rank}</div>
        </div>
        `
    })

    podium.innerHTML = html
}

function renderTable(data) {

    const container = document.getElementById("leaderboardContainer")

    if (!data || data.length === 0) {
        container.innerHTML = `
        <div class="empty-state">
            <div class="empty-icon">📭</div>
            <h3>No data yet</h3>
            <p>Be the first to report and resolve campus issues!</p>
        </div>
        `
        return
    }

    container.innerHTML = data.map((user, index) => `
        <div class="user-row">

            <div class="col-rank">#${index + 1}</div>

            <div class="col-user">
                <div class="avatar">${user.name[0].toUpperCase()}</div>
                <div class="user-name">${user.name}</div>
            </div>

            <div class="col-solved">${user.issues_solved} issues</div>

            <div class="col-points">
                <span class="points-pill">${user.points}</span>
            </div>

        </div>
    `).join("")
}

getLeaderboard()

// Navigation
document.getElementById("logoutBtn").addEventListener("click", function () {
    localStorage.removeItem("token")
    window.location.href = "login.html"
})

document.getElementById("dashboardBtn").addEventListener("click", function () {
    window.location.href = "dashboard.html"
})

document.getElementById("reportIssueBtn").addEventListener("click", function () {
    window.location.href = "report-issue.html"
})

document.getElementById("myProfileBtn").addEventListener("click", function () {
    window.location.href = "My_profile.html"
})

document.getElementById("resolvedBtn").addEventListener("click", function () {
    window.location.href = "resolved.html"
})

</script>

</body>
</html>
