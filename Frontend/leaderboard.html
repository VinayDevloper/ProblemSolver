<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard – CampusCoord</title>

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

.container {
    display: flex;
}

/* ── Sidebar (identical to dashboard) ── */
.sidebar {
    position: fixed;
    left: 0;
    top: 0;
    width: 280px;
    height: 100vh;
    padding: 20px;
    background: #e9ecef;
    display: flex;
    flex-direction: column;
}

.logo {
    color: #0d6efd;
    margin-bottom: 40px;
    font-size: 22px;
    font-weight: 700;
}

.menu-item {
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
    color: #374151;
}

.menu-item:hover {
    background: #dbeafe;
    transform: translateX(4px);
    transition: 0.2s;
}

.active {
    background: #dbeafe;
    color: #0d6efd;
    font-weight: 700;
}

.logout-section {
    margin-top: auto;
    border-top: 1px solid #d1d5db;
    padding-top: 20px;
}

.logout {
    background: #fee2e2;
    color: #dc2626;
    border: 1px solid #fecaca;
    text-align: center;
    font-weight: 600;
}

.logout:hover {
    background: #fecaca;
}

/* ── Main content ── */
.main-content {
    margin-left: 320px;
    padding: 40px;
    width: 100%;
}

.page-title {
    font-size: 32px;
    font-weight: 700;
    color: #111827;
    margin-bottom: 6px;
}

.subtitle {
    color: #6b7280;
    font-size: 15px;
    margin-bottom: 40px;
}

/* ── Two column layout: left table / right sticky Top 3 ── */
.content-layout {
    display: flex;
    gap: 24px;
    align-items: flex-start;
}

.left-col {
    flex: 0 0 75%;
    max-width: 75%;
}

.right-col {
    flex: 0 0 25%;
    max-width: 25%;
    position: sticky;
    top: 40px;
}

/* ── Top 3 Contributors card (refined, minimal) ── */
.top3-card {
    background: white;
    border-radius: 14px;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    padding: 28px 24px;
}

.top3-card h3 {
    margin: 0 0 4px;
    font-size: 16px;
    font-weight: 700;
    color: #111827;
}

.top3-subtitle {
    color: #9ca3af;
    font-size: 12px;
    margin-bottom: 24px;
}

.top3-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 12px;
    border-radius: 10px;
    margin-bottom: 10px;
}

.top3-item:last-child {
    margin-bottom: 0;
}

.top3-item.gold {
    background: #fffbeb;
    border-left: 3px solid #f59e0b;
}

.top3-item.silver {
    background: #f8fafc;
    border-left: 3px solid #94a3b8;
}

.top3-item.bronze {
    background: #fff7ed;
    border-left: 3px solid #cd7c3b;
}

.top3-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: #dbeafe;
    color: #2563eb;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
}

.top3-info {
    flex: 1;
    min-width: 0;
}

.top3-name {
    font-weight: 600;
    color: #111827;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.top3-sub {
    font-size: 12px;
    color: #9ca3af;
    margin-top: 2px;
}

.top3-points {
    flex-shrink: 0;
    background: #dbeafe;
    color: #1d4ed8;
    padding: 4px 11px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
}

/* ── Leaderboard table card ── */
.leaderboard-card {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    max-width: 860px;
}

.lb-header {
    display: grid;
    grid-template-columns: 70px 1fr 150px 120px;
    padding: 12px 24px;
    background: #f9fafb;
    border-bottom: 1px solid #e5e7eb;
    font-size: 12px;
    font-weight: 700;
    font-family: Arial, sans-serif;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
}

.lb-header .col-solved,
.lb-header .col-points {
    text-align: right;
}

.user-row {
    display: grid;
    grid-template-columns: 70px 1fr 150px 120px;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid #f3f4f6;
    transition: background 0.15s;
}

.user-row:last-child {
    border-bottom: none;
}

.user-row:hover {
    background: #f9fafb;
}

.col-rank {
    font-size: 18px;
    font-weight: 700;
    color: #2563eb;
}

.col-user {
    display: flex;
    align-items: center;
    gap: 14px;
}

.avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #dbeafe;
    color: #2563eb;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 700;
    font-size: 16px;
    flex-shrink: 0;
}

.user-name {
    font-size: 16px;
    font-weight: 600;
    color: #111827;
}

.col-solved {
    font-size: 14px;
    color: #6b7280;
    text-align: right;
}

.col-points {
    text-align: right;
}

.points-pill {
    display: inline-block;
    background: #dbeafe;
    color: #1d4ed8;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 15px;
    font-weight: 700;
}

/* ── Loading / empty state ── */
.empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #6b7280;
}

.empty-state .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
}

.empty-state h3 {
    margin: 0 0 8px;
    color: #374151;
    font-size: 18px;
}

</style>
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">

        <h2 class="logo">CampusCoord</h2>

        <div class="menu-item" id="dashboardBtn">Dashboard</div>
        <div class="menu-item" id="reportIssueBtn">Report Issue</div>
        <div class="menu-item" id="myProfileBtn">My Profile</div>
        <div class="menu-item active">Leaderboard</div>
        <div class="menu-item" id="resolvedBtn">Resolved</div>

        <div class="logout-section">
            <div class="menu-item logout" id="logoutBtn">Logout</div>
        </div>

    </div>

    <!-- Main -->
    <div class="main-content">

        <h1 class="page-title">Top Contributors</h1>
        <p class="subtitle">People helping solve campus problems</p>

        <div class="content-layout">

            <!-- LEFT (75%): Full table — unchanged -->
            <div class="left-col">
                <div class="leaderboard-card">
                    <div class="lb-header">
                        <span>Rank</span>
                        <span>Student</span>
                        <span class="col-solved">Issues Solved</span>
                        <span class="col-points">Points</span>
                    </div>
                    <div id="leaderboardContainer"></div>
                </div>
            </div>

            <!-- RIGHT (25%): Sticky Top 3 card — replaces podium -->
            <div class="right-col">
                <div class="top3-card">
                    <h3>Top Contributors</h3>
                    <p class="top3-subtitle">Our most active problem solvers</p>
                    <div id="top3Container"></div>
                </div>
            </div>

        </div>

    </div>

</div>

<script>

async function getLeaderboard() {

    const response = await fetch("http://127.0.0.1:8000/leaderboard")
    const data = await response.json()

    renderTop3(data)
    renderTable(data)
}

function renderTop3(data) {

    const container = document.getElementById("top3Container")

    if (!data || data.length === 0) {
        container.innerHTML = `<p style="color:#6b7280; font-size:13px;">No data yet</p>`
        return
    }

    const classes = ["gold", "silver", "bronze"]

    const top3 = data.slice(0, 3)

    container.innerHTML = top3.map((user, index) => `
        <div class="top3-item ${classes[index]}">
            <div class="top3-avatar">${user.name[0].toUpperCase()}</div>
            <div class="top3-info">
                <div class="top3-name">${user.name}</div>
                <div class="top3-sub">${user.issues_solved} issues solved</div>
            </div>
            <span class="top3-points">${user.points}</span>
        </div>
    `).join("")
}

function renderTable(data) {

    const container = document.getElementById("leaderboardContainer")

    if (!data || data.length === 0) {
        container.innerHTML = `
        <div class="empty-state">
            <div class="empty-icon">📭</div>
            <h3>No data yet</h3>
            <p>Be the first to report and resolve campus issues!</p>
        </div>
        `
        return
    }

    container.innerHTML = data.map((user, index) => `
        <div class="user-row">

            <div class="col-rank">#${index + 1}</div>

            <div class="col-user">
                <div class="avatar">${user.name[0].toUpperCase()}</div>
                <div class="user-name">${user.name}</div>
            </div>

            <div class="col-solved">${user.issues_solved} issues</div>

            <div class="col-points">
                <span class="points-pill">${user.points}</span>
            </div>

        </div>
    `).join("")
}

getLeaderboard()

// Navigation
document.getElementById("logoutBtn").addEventListener("click", function () {
    localStorage.removeItem("token")
    window.location.href = "login.html"
})

document.getElementById("dashboardBtn").addEventListener("click", function () {
    window.location.href = "dashboard.html"
})

document.getElementById("reportIssueBtn").addEventListener("click", function () {
    window.location.href = "report-issue.html"
})

document.getElementById("myProfileBtn").addEventListener("click", function () {
    window.location.href = "My_profile.html"
})

document.getElementById("resolvedBtn").addEventListener("click", function () {
    window.location.href = "resolved.html"
})

</script>

</body>
</html>
