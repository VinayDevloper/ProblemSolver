<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

    <style>

body{
    font-family:'Segoe UI', sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-card{
    background:white;
    padding:40px;
    width:350px;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.register-section{
    margin-top:25px;
    text-align:center;
}

.register-text{
    color:#6b7280;
    font-size:15px;
}

.register-link{
    color:#2563eb;
    text-decoration:none;
    font-weight:600;
    margin-left:6px;
}

.register-link:hover{
    text-decoration:underline;
}



.logo{
    width:70px;
    display:block;
    margin:auto;
}

h1{
    text-align:center;
    color:#2563eb;
}

.subtitle{
    text-align:center;
    color:gray;
    margin-bottom:25px;
}

.register-section{
    margin-top:25px;
    text-align:center;
}

.register-text{
    color:#6b7280;
    font-size:15px;
}

.register-link{
    color:#2563eb;
    text-decoration:none;
    font-weight:600;
    margin-left:6px;
}

.register-link:hover{
    text-decoration:underline;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    box-sizing:border-box;
    border:1px solid #d1d5db;
    border-radius:8px;
    font-size:15px;
}
.password-box{
    position:relative;
    margin-bottom:15px;
}

#togglePassword{
    position:absolute;
    right:15px;
    top:15px;
    width:16px;
    height:12px;
    cursor:pointer;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.footer-text{
    text-align:center;
    color:gray;
    margin-top:20px;
}

.copyright{
    text-align:center;
    color:gray;
    font-size:13px;
    margin-top:20px;
}

</style>

</head>

<body>

    <div class="login-container">

    <div class="login-card">

        <img
            src="images/Logo.png"
            class="logo"
        >

        <h1>CampusCoord</h1>

        <p class="subtitle">
            Smart Coordination System
        </p>

        <label>Email Address</label>

        <input
            type="email"
            id="email"
            placeholder="name@university.edu"
        >

        <label>Password</label>

        <div class="password-box">

            <input
                type="password"
                id="password"
                placeholder="Enter password"
            >

            <img
                src="images/eye.png"
                id="togglePassword"
            >

        </div>

        <button id="loginBtn">
            Sign In
        </button>

        <p class="footer-text">
            Please use your official college email.
        </p>

        <div class="register-section">

            <span class="register-text">
                Don't have an account?
            </span>

            <a
                href="register.html"
                class="register-link"
            >
                Register Here
            </a>


        </div>

    </div>

    <p class="copyright">
    © 2026 CampusCoord. All rights reserved.
</p>

</div>


    <script>

        const loginButton = document.getElementById("loginBtn")



        loginButton.addEventListener("click", async function () {

            const email = document.getElementById("email").value

            const password = document.getElementById("password").value


            const formData = new URLSearchParams()

            formData.append("username", email)

            formData.append("password", password)


            const response = await fetch(
                "http://127.0.0.1:8000/login",
                {
                    method: "POST",

                    headers: {
                        "Content-Type":
                        "application/x-www-form-urlencoded"
                    },

                    body: formData
                }
            )

            const data = await response.json()

            console.log(data)

            if(data.access_token){

                localStorage.setItem(
                    "token",
                    data.access_token
                )

                localStorage.setItem(
                    "name",
                    data.user.name
                )

                localStorage.setItem(
                    "user_id",
                    data.user.id
                )

                window.location.href = "dashboard.html"
            }
            else{

                alert(data.message)
            }
        })

        const togglePassword =
        document.getElementById("togglePassword")

        const passwordInput =
        document.getElementById("password")

        togglePassword.addEventListener(
            "click",

            function(){

                if(passwordInput.type === "password"){
                    passwordInput.type = "text"
                }
                else{
                    passwordInput.type = "password"
                }

            }
        )

    </script>

</body>

</html>
